<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Popup Advertisement UI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Arial, sans-serif;
    height: 1000px; /* for scroll demo */
    margin: 0;
    padding: 20px;
  }

  /* Trigger Button */
  #triggerBtn {
    padding: 10px 18px;
    font-size: 16px;
  }

  /* Overlay */
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
  }

  /* Popup Box */
  .popup {
    background: #fff;
    width: min(90%, 400px);
    padding: 20px;
    border-radius: 10px;
    text-align: center;
    position: relative;
    animation: popupAnim 0.3s ease;
  }

  @keyframes popupAnim {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .popup h2 {
    margin-top: 0;
  }

  .popup img {
    width: 100%;
    border-radius: 6px;
    margin: 10px 0;
  }

  .popup button {
    padding: 10px 16px;
    background: #007bff;
    color: #fff;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
  }

  .popup button:hover {
    background: #0056b3;
  }

  /* Close Button */
  .close-btn {
    position: absolute;
    top: 8px;
    right: 12px;
    font-size: 22px;
    background: none;
    border: none;
    cursor: pointer;
  }
</style>
</head>

<body>

<script>
  const overlay = document.getElementById("overlay");
  const closeBtn = document.querySelector(".close-btn");
  const triggerBtn = document.getElementById("triggerBtn");
  const ctaBtn = document.getElementById("ctaBtn");

  // 4.5 Behavior Control (demo-level)
  let popupShown = false;

  function showPopup() {
    if (!popupShown) {
      overlay.style.display = "flex";
      document.body.style.overflow = "hidden"; // disable background interaction
      popupShown = true;
    }
  }

  function closePopup() {
    overlay.style.display = "none";
    document.body.style.overflow = "auto";
  }

  /* 4.1.1 Popup on page load */
  window.addEventListener("load", () => {
    showPopup();
  });

  /* 4.1.2 Popup after time delay */
  setTimeout(() => {
    showPopup();
  }, 3000);

  /* 4.1.3 Popup on button click */
  triggerBtn.addEventListener("click", showPopup);

  /* 4.1.4 Popup on scroll (optional) */
  window.addEventListener("scroll", () => {
    if (window.scrollY > 400) {
      showPopup();
    }
  });

  /* 4.4.1 Close button */
  closeBtn.addEventListener("click", closePopup);

  /* 4.4.2 Close on overlay click */
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) {
      closePopup();
    }
  });

  /* 4.4.3 Close using ESC key */
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      closePopup();
    }
  });

  /* CTA Action */
  ctaBtn.addEventListener("click", () => {
    alert("Redirecting to purchase page...");
    closePopup();
  });
</script>
